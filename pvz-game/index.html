<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>植物大战僵尸</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="gameContainer">
        <!-- 战斗界面 -->
        <div id="battleScreen">
            <div id="topBar">
                <div id="sunCounter">☀️ 50</div>
                <div id="coinCounter">🪙 0</div>
                <div id="shovelBtn" title="铲子">🪏</div>
                <div id="plantCards"></div>
                <div id="controlBtns">
                    <button class="ctrlBtn" id="pauseBtn" title="暂停">⏸️</button>
                    <button class="ctrlBtn" id="speedBtn" title="速度">1x</button>
                </div>
            </div>
            <canvas id="gameCanvas"></canvas>
            <div id="waveInfo">波次: 1/10</div>
            <div id="levelInfo">关卡: 1</div>
            <div id="countdownDisplay">
                <div class="countdownText">僵尸即将出现</div>
                <div class="countdownTimer" id="countdownTimer">20</div>
            </div>
        </div>

        <!-- 主菜单 - PvZ动态场景 -->
        <div id="mainMenuScreen" class="sceneScreen">
            <div class="scene-bg pvz-bg">
                <div class="sky-layer"></div>
                <div class="grass-layer"></div>
                <div class="fence-layer"></div>
                <canvas id="menuCanvas"></canvas>
            </div>
            <div class="scene-content">
                <h1 class="game-title">🌻 植物大战僵尸 🧟</h1>
                <div class="menu-buttons">
                    <button class="menu-btn primary" onclick="game.showLevelSelect()">🎮 冒险模式</button>
                    <button class="menu-btn" onclick="game.showGarden()">🌻 花园</button>
                    <button class="menu-btn" onclick="game.showShop()">🏪 商店</button>
                    <button class="menu-btn" onclick="game.showAlmanac()">📖 图鉴</button>
                    <button class="menu-btn" onclick="game.showSettings()">⚙️ 设置</button>
                </div>
            </div>
        </div>

        <!-- 关卡选择 - 古代地图场景 -->
        <div id="levelSelectScreen" class="sceneScreen">
            <div class="scene-bg map-bg">
                <div class="map-paper"></div>
                <div class="map-compass"></div>
                <div class="map-routes"></div>
            </div>
            <div class="scene-content">
                <h2>🗺️ 选择关卡</h2>
                <div class="level-grid" id="levelGrid"></div>
                <button class="back-btn" onclick="game.closeLevelSelect()">← 返回主菜单</button>
            </div>
        </div>

        <!-- 设置 - 神秘实验室场景 -->
        <div id="settingsScreen" class="sceneScreen">
            <div class="scene-bg lab-bg">
                <div class="lab-shelves"></div>
                <div class="lab-potions"></div>
                <div class="lab-glow"></div>
            </div>
            <div class="scene-content">
                <h2>⚙️ 设置</h2>
                <div class="settings-box">
                    <div class="setting-item">
                        <label>背景音乐</label>
                        <input type="range" id="bgmVolume" min="0" max="100" value="50" onchange="game.setBGMVolume(this.value)">
                    </div>
                    <div class="setting-item">
                        <label>音效</label>
                        <input type="range" id="sfxVolume" min="0" max="100" value="30" onchange="game.setSFXVolume(this.value)">
                    </div>
                </div>
                <button class="back-btn" onclick="game.closeSettings()">← 返回主菜单</button>
            </div>
        </div>

        <!-- 花园 - 阳光花园场景 -->
        <div id="gardenScreen" class="sceneScreen">
            <div class="scene-bg garden-bg">
                <div class="garden-sky"></div>
                <div class="garden-sun"></div>
                <div class="garden-fence"></div>
                <div class="garden-flowers"></div>
                <div class="garden-butterflies"></div>
            </div>
            <div class="scene-content">
                <h2>🌻 我的花园</h2>
                <div class="seed-info">种子: <span id="seedCount">0</span> 🌱</div>
                <div class="garden-grid" id="gardenGrid"></div>
                <button class="back-btn" onclick="game.closeGarden()">← 返回主菜单</button>
            </div>
        </div>

        <!-- 商店 - 神秘商店场景 -->
        <div id="shopScreen" class="sceneScreen">
            <div class="scene-bg shop-bg">
                <div class="shop-shelf"></div>
                <div class="shop-orbs"></div>
                <div class="shop-curtain"></div>
                <div class="shop-mist"></div>
            </div>
            <div class="scene-content">
                <h2>🏪 商店</h2>
                <div class="coin-info">金币: <span id="shopCoins">0</span> 🪙</div>
                <div class="shop-grid" id="shopGrid"></div>
                <button class="back-btn" onclick="game.closeShop()">← 返回主菜单</button>
            </div>
        </div>

        <!-- 图鉴 - 古老图书馆场景 -->
        <div id="almanacScreen" class="sceneScreen">
            <div class="scene-bg library-bg">
                <div class="library-books"></div>
                <div class="library-candles"></div>
                <div class="library-dust"></div>
            </div>
            <div class="scene-content">
                <h2>📖 图鉴</h2>
                <div class="almanac-tabs">
                    <button class="tab-btn active" onclick="game.switchAlmanacTab('plants')">🌱 植物</button>
                    <button class="tab-btn" onclick="game.switchAlmanacTab('zombies')">🧟 僵尸</button>
                </div>
                <div class="almanac-grid" id="almanacGrid"></div>
                <div class="almanac-detail" id="almanacDetail"></div>
                <button class="back-btn" onclick="game.closeAlmanac()">← 返回主菜单</button>
            </div>
        </div>

        <!-- 植物选择 - 温室场景 -->
        <div id="plantSelectScreen" class="sceneScreen">
            <div class="scene-bg greenhouse-bg">
                <div class="greenhouse-glass"></div>
                <div class="greenhouse-plants"></div>
                <div class="greenhouse-light"></div>
            </div>
            <div class="scene-content">
                <h2>🌿 选择出战植物</h2>
                <div class="select-info">已选择: <span id="selectedCount">0</span>/7</div>
                <div class="plant-select-grid" id="plantSelectGrid"></div>
                <button class="back-btn confirm-btn" onclick="game.confirmPlantSelection()">✓ 确认选择</button>
            </div>
        </div>

        <!-- 胜利 - 庆典场景 -->
        <div id="victoryScreen" class="sceneScreen">
            <div class="scene-bg celebration-bg">
                <div class="celebration-fireworks"></div>
                <div class="celebration-confetti"></div>
                <div class="celebration-stars"></div>
            </div>
            <div class="scene-content">
                <h2>🎉 关卡完成！</h2>
                <div class="victory-stars" id="victoryStars">⭐⭐⭐</div>
                <div class="victory-msg" id="victoryMessage"></div>
                <div class="victory-btns">
                    <button class="action-btn" id="nextLevelBtn" onclick="game.nextLevel()">下一关 →</button>
                    <button class="back-btn" onclick="game.returnToMenu()">← 返回主菜单</button>
                </div>
            </div>
        </div>

        <!-- 弹窗层 -->
        <div id="gameMenu">
            <h1>植物大战僵尸</h1>
            <p>保卫你的花园！</p>
            <button onclick="game.start()">开始游戏</button>
        </div>

        <div id="newPlantReward">
            <h2>🎉 获得新植物！</h2>
            <div class="plant-icon" id="rewardIcon">🌱</div>
            <div class="plant-name" id="rewardName">豌豆射手</div>
            <button onclick="game.closeReward()">太棒了！</button>
        </div>

        <div id="pauseMenu">
            <h2>⏸️ 游戏暂停</h2>
            <button class="menu-btn" onclick="game.resume()">▶️ 继续游戏</button>
            <button class="menu-btn" onclick="game.restart()">🔄 重新开始</button>
            <button class="menu-btn" onclick="game.backToMenu()">🏠 返回主菜单</button>
        </div>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
