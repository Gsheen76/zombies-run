<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>植物大战僵尸</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(to bottom, #87CEEB, #228B22);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            background: #4a7c23;
            border: 4px solid #2d5016;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        #gameCanvas { display: block; cursor: pointer; }
        #topBar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: linear-gradient(to bottom, #5d4037, #3e2723);
            display: flex;
            align-items: center;
            padding: 5px 10px;
            border-bottom: 3px solid #2d5016;
        }
        #sunCounter {
            background: linear-gradient(to bottom, #fff59d, #ffc107);
            border: 3px solid #ff8f00;
            border-radius: 20px;
            padding: 8px 15px;
            font-size: 20px;
            font-weight: bold;
            color: #5d4037;
            min-width: 100px;
            text-align: center;
            text-shadow: 1px 1px 0 #fff;
            margin-right: 10px;
        }
        #coinCounter {
            background: linear-gradient(to bottom, #ffd700, #daa520);
            border: 3px solid #b8860b;
            border-radius: 20px;
            padding: 8px 15px;
            font-size: 16px;
            font-weight: bold;
            color: #5d4037;
            min-width: 80px;
            text-align: center;
            margin-right: 10px;
        }
        #shovelBtn {
            width: 50px;
            height: 60px;
            background: linear-gradient(to bottom, #bcaaa4, #8d6e63);
            border: 2px solid #5d4037;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-right: 10px;
        }
        #shovelBtn:hover { background: linear-gradient(to bottom, #a1887f, #6d4c41); }
        #shovelBtn.selected { border-color: #ffeb3b; box-shadow: 0 0 10px #ffeb3b; }
        #plantCards { display: flex; gap: 5px; flex: 1; }
        .plantCard {
            width: 60px;
            height: 70px;
            background: linear-gradient(to bottom, #c8e6c9, #81c784);
            border: 2px solid #388e3c;
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .plantCard:hover { transform: scale(1.05); background: linear-gradient(to bottom, #a5d6a7, #66bb6a); }
        .plantCard.selected { border-color: #ffeb3b; box-shadow: 0 0 10px #ffeb3b; }
        .plantCard .cooldownOverlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            pointer-events: none;
        }
        .plantCard .cooldownText {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 14px;
            font-weight: bold;
            z-index: 10;
        }
        .plantCard .icon { position: relative; z-index: 5; }
        .plantCard .cost {
            position: absolute;
            bottom: 2px;
            font-size: 12px;
            font-weight: bold;
            color: #2e7d32;
            background: rgba(255,255,255,0.7);
            padding: 1px 5px;
            border-radius: 8px;
            z-index: 5;
        }
        #controlBtns { display: flex; gap: 5px; margin-left: 10px; }
        .ctrlBtn {
            width: 40px;
            height: 40px;
            background: linear-gradient(to bottom, #607d8b, #455a64);
            border: 2px solid #37474f;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
        }
        .ctrlBtn:hover { transform: scale(1.1); }
        .ctrlBtn.active { background: linear-gradient(to bottom, #ff9800, #f57c00); border-color: #e65100; }
        #waveInfo {
            position: absolute;
            top: 90px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 16px;
        }
        #mainMenu {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #1a472a 0%, #2d5a27 50%, #1a472a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        #mainMenu h1 {
            font-size: 48px;
            color: #FFD700;
            text-shadow: 3px 3px 0 #8B4513;
            margin-bottom: 40px;
        }
        .menuBtn {
            width: 250px;
            padding: 15px 30px;
            margin: 10px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            background: linear-gradient(to bottom, #4CAF50, #2E7D32);
            border: 3px solid #1B5E20;
            border-radius: 10px;
            cursor: pointer;
        }
        .menuBtn:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        #settingsPanel, #gardenPanel, #shopPanel {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            color: white;
            padding: 30px 40px;
            border-radius: 15px;
            display: none;
            z-index: 250;
            max-height: 90vh;
            overflow-y: auto;
        }
        #settingsPanel h2, #gardenPanel h2, #shopPanel h2 { text-align: center; margin-bottom: 20px; color: #FFD700; }
        .settingRow { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; }
        .settingRow label { font-size: 16px; }
        .settingRow input[type="range"] { width: 150px; }
        .closeBtn {
            display: block;
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            font-size: 16px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #pauseMenu {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 40px 50px;
            border-radius: 15px;
            display: none;
            z-index: 200;
            text-align: center;
        }
        #pauseMenu h2 { font-size: 32px; margin-bottom: 20px; }
        #gameMenu {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 100;
        }
        #gameMenu h1 { font-size: 36px; margin-bottom: 20px; }
        #gameMenu p { font-size: 18px; margin-bottom: 20px; }
        #gameMenu button { background: linear-gradient(to bottom, #4caf50, #2e7d32); color: white; border: none; padding: 15px 40px; font-size: 20px; border-radius: 10px; cursor: pointer; margin: 5px; }
        #gardenPanel .gardenGrid { display: grid; grid-template-columns: repeat(5, 80px); gap: 10px; margin-top: 20px; }
        .gardenSlot {
            width: 80px; height: 80px;
            background: linear-gradient(to bottom, #5d4037, #3e2723);
            border: 2px solid #8B4513;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .gardenSlot:hover { border-color: #FFD700; }
        .gardenSlot.hasPlant { background: linear-gradient(to bottom, #4a7c23, #3d6b1c); }
        #shopPanel .shopGrid { display: grid; grid-template-columns: repeat(3, 150px); gap: 15px; margin-top: 20px; }
        .shopItem {
            background: linear-gradient(to bottom, #4a5568, #2d3748);
            border: 2px solid #718096;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
        }
        .shopItem:hover { border-color: #FFD700; }
        .shopItem.owned { border-color: #4CAF50; background: linear-gradient(to bottom, #2d5016, #1a472a); }
        .shopItem .price { color: #FFD700; font-weight: bold; margin-top: 5px; }
        .seedCount { color: #90EE90; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="topBar">
            <div id="sunCounter">☀️ 50</div>
            <div id="coinCounter">🪙 0</div>
            <div id="shovelBtn" title="铲子">🪏</div>
            <div id="plantCards"></div>
            <div id="controlBtns">
                <button class="ctrlBtn" id="pauseBtn" title="暂停">⏸️</button>
                <button class="ctrlBtn" id="speedBtn" title="速度">1x</button>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="waveInfo">波次: 1/10</div>
        
        <div id="mainMenu">
            <h1>🌻 植物大战僵尸 🧟</h1>
            <button class="menuBtn" onclick="game.showAdventureStart()">🎮 冒险模式</button>
            <button class="menuBtn" onclick="game.showGarden()">🌻 花园</button>
            <button class="menuBtn" onclick="game.showShop()">🏪 商店</button>
            <button class="menuBtn" onclick="game.showSettings()">⚙️ 设置</button>
        </div>
        
        <div id="settingsPanel">
            <h2>⚙️ 设置</h2>
            <div class="settingRow"><label>背景音乐音量</label><input type="range" id="bgmVolume" min="0" max="100" value="50" onchange="game.setBGMVolume(this.value)"></div>
            <div class="settingRow"><label>音效音量</label><input type="range" id="sfxVolume" min="0" max="100" value="30" onchange="game.setSFXVolume(this.value)"></div>
            <div class="settingRow"><label>游戏难度</label><select id="difficulty" onchange="game.setDifficulty(this.value)"><option value="easy">简单</option><option value="normal" selected>普通</option><option value="hard">困难</option></select></div>
            <button class="closeBtn" onclick="game.closeSettings()">确定</button>
        </div>
        
        <div id="gardenPanel">
            <h2>🌻 我的花园</h2>
            <div class="seedCount">种子: <span id="seedCount">0</span> 🌱</div>
            <div class="gardenGrid" id="gardenGrid"></div>
            <button class="closeBtn" onclick="game.closeGarden()">返回</button>
        </div>
        
        <div id="shopPanel">
            <h2>🏪 商店</h2>
            <div class="seedCount">金币: <span id="shopCoins">0</span> 🪙</div>
            <div class="shopGrid" id="shopGrid"></div>
            <button class="closeBtn" onclick="game.closeShop()">返回</button>
        </div>
        
        <div id="pauseMenu">
            <h2>⏸️ 游戏暂停</h2>
            <button class="menuBtn" onclick="game.resume()">▶️ 继续游戏</button>
            <button class="menuBtn" onclick="game.restart()">🔄 重新开始</button>
            <button class="menuBtn" onclick="game.backToMenu()">🏠 返回主菜单</button>
        </div>
        
        <div id="gameMenu">
            <h1>植物大战僵尸</h1>
            <p>保卫你的花园！</p>
            <button onclick="game.start()">开始游戏</button>
        </div>
    </div>

    <script>
        class SoundManager {
            constructor() {
                this.audioContext = null;
                this.enabled = true;
                this.bgm = new Audio('01.开始背景音乐_爱给网_aigei_com.MP3');
                this.bgm.loop = true;
                this.bgmVolume = 0.5;
                this.sfxVolume = 0.3;
                this.bgm.volume = this.bgmVolume;
            }
            init() {
                if (!this.audioContext) this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            playBGM() { this.bgm.play().catch(() => {}); }
            pauseBGM() { this.bgm.pause(); }
            setBGMVolume(vol) { this.bgmVolume = vol; this.bgm.volume = vol; }
            setSFXVolume(vol) { this.sfxVolume = vol; }
            playTone(frequency, duration, type = 'sine', volume = 0.3) {
                if (!this.enabled || !this.audioContext) return;
                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(this.audioContext.destination);
                oscillator.frequency.value = frequency;
                oscillator.type = type;
                gainNode.gain.setValueAtTime(volume * this.sfxVolume, this.audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + duration);
                oscillator.start(this.audioContext.currentTime);
                oscillator.stop(this.audioContext.currentTime + duration);
            }
            plantSound() { this.playTone(440, 0.1, 'sine', 0.2); setTimeout(() => this.playTone(550, 0.1, 'sine', 0.2), 50); }
            shootSound() { this.playTone(800, 0.05, 'square', 0.1); }
            hitSound() { this.playTone(200, 0.1, 'sawtooth', 0.15); }
            sunCollectSound() { this.playTone(880, 0.1, 'sine', 0.2); setTimeout(() => this.playTone(1100, 0.15, 'sine', 0.2), 80); }
            coinCollectSound() { this.playTone(1200, 0.1, 'sine', 0.25); setTimeout(() => this.playTone(1500, 0.15, 'sine', 0.25), 80); }
            seedDropSound() { this.playTone(600, 0.2, 'triangle', 0.3); setTimeout(() => this.playTone(800, 0.2, 'triangle', 0.3), 100); }
            zombieDeathSound() { this.playTone(150, 0.2, 'sawtooth', 0.2); setTimeout(() => this.playTone(100, 0.3, 'sawtooth', 0.15), 100); }
            explosionSound() { for (let i = 0; i < 5; i++) setTimeout(() => this.playTone(100 + Math.random() * 100, 0.1, 'sawtooth', 0.3), i * 30); }
            gameOverSound() { this.playTone(300, 0.3, 'sine', 0.3); setTimeout(() => this.playTone(250, 0.3, 'sine', 0.3), 200); setTimeout(() => this.playTone(200, 0.5, 'sine', 0.3), 400); }
            winSound() { const notes = [523, 659, 784, 1047]; notes.forEach((note, i) => setTimeout(() => this.playTone(note, 0.2, 'sine', 0.25), i * 150)); }
            waveSound() { this.playTone(600, 0.15, 'triangle', 0.2); setTimeout(() => this.playTone(800, 0.2, 'triangle', 0.25), 100); }
        }

        const sound = new SoundManager();

        const CONFIG = {
            CANVAS_WIDTH: 900, CANVAS_HEIGHT: 600,
            GRID_COLS: 9, GRID_ROWS: 5,
            CELL_WIDTH: 80, CELL_HEIGHT: 100,
            GRID_OFFSET_X: 60, TOP_BAR_HEIGHT: 80,
            SUN_VALUE: 25, SUN_INTERVAL: 10000, TOTAL_WAVES: 10
        };

        const PLANTS = {
            sunflower: { name: '向日葵', cost: 50, cooldown: 7500, health: 100, sunInterval: 8000, color: '#FFD700' },
            peashooter: { name: '豌豆射手', cost: 100, cooldown: 7500, health: 100, damage: 25, fireRate: 1500, color: '#4CAF50' },
            wallnut: { name: '坚果墙', cost: 50, cooldown: 30000, health: 4000, color: '#8B4513' },
            snowpea: { name: '寒冰射手', cost: 175, cooldown: 7500, health: 100, damage: 20, fireRate: 1500, slowEffect: 0.5, color: '#00BCD4' },
            cherrybomb: { name: '樱桃炸弹', cost: 150, cooldown: 50000, health: 100, damage: 1800, color: '#F44336' },
            repeater: { name: '双发射手', cost: 200, cooldown: 7500, health: 100, damage: 20, fireRate: 1500, color: '#2E7D32' }
        };

        const ZOMBIES = {
            normal: { name: '普通僵尸', health: 200, speed: 0.015, damage: 100 },
            cone: { name: '路障僵尸', health: 560, speed: 0.015, damage: 100 },
            bucket: { name: '铁桶僵尸', health: 1300, speed: 0.015, damage: 100 },
            flag: { name: '旗帜僵尸', health: 200, speed: 0.025, damage: 100 },
            polevault: { name: '撑杆跳僵尸', health: 170, speed: 0.025, damage: 100, canJump: true }
        };

        const SHOP_ITEMS = [
            { id: 'golden_peashooter', name: '金色豌豆射手', price: 500, type: 'skin', plant: 'peashooter', desc: '闪亮的金色外观' },
            { id: 'ice_wallnut', name: '冰霜坚果', price: 300, type: 'skin', plant: 'wallnut', desc: '冰蓝色皮肤' },
            { id: 'fire_sunflower', name: '火焰向日葵', price: 400, type: 'skin', plant: 'sunflower', desc: '燃烧的火焰外观' },
            { id: 'diamond_repeater', name: '钻石双发射手', price: 600, type: 'skin', plant: 'repeater', desc: '璀璨钻石造型' },
            { id: 'shadow_snowpea', name: '暗影寒冰射手', price: 450, type: 'skin', plant: 'snowpea', desc: '神秘的暗影外观' },
            { id: 'garden_slot', name: '花园槽位', price: 200, type: 'slot', desc: '扩展花园容量' }
        ];

        class Game {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.canvas.width = CONFIG.CANVAS_WIDTH;
                this.canvas.height = CONFIG.CANVAS_HEIGHT;
                
                this.sunCount = 50;
                this.coins = 0;
                this.seeds = 0;
                this.selectedPlant = null;
                this.shovelSelected = false;
                this.grid = [];
                this.plants = [];
                this.zombies = [];
                this.projectiles = [];
                this.suns = [];
                this.coins_game = [];
                this.seeds_game = [];
                this.particles = [];
                this.lawnMowers = [];
                
                this.wave = 0;
                this.totalWaves = CONFIG.TOTAL_WAVES;
                this.zombiesInWave = 0;
                this.zombiesKilled = 0;
                this.waveInProgress = false;
                
                this.lastSunDrop = 0;
                this.lastZombieSpawn = 0;
                this.gameRunning = false;
                this.gameOver = false;
                this.gameWon = false;
                this.paused = false;
                this.gameSpeed = 1;
                this.difficulty = 'normal';
                this.cooldowns = {};
                
                this.ownedSkins = JSON.parse(localStorage.getItem('pvz_skins') || '[]');
                this.gardenPlants = JSON.parse(localStorage.getItem('pvz_garden') || '[]');
                this.gardenSlots = parseInt(localStorage.getItem('pvz_slots') || '10');
                this.loadProgress();
                
                this.initGrid();
                this.initUI();
                this.setupEventListeners();
                this.showMainMenu();
            }

            loadProgress() {
                this.coins = parseInt(localStorage.getItem('pvz_coins') || '0');
                this.seeds = parseInt(localStorage.getItem('pvz_seeds') || '0');
            }

            saveProgress() {
                localStorage.setItem('pvz_coins', this.coins);
                localStorage.setItem('pvz_seeds', this.seeds);
                localStorage.setItem('pvz_skins', JSON.stringify(this.ownedSkins));
                localStorage.setItem('pvz_garden', JSON.stringify(this.gardenPlants));
                localStorage.setItem('pvz_slots', this.gardenSlots);
            }

            initGrid() {
                for (let row = 0; row < CONFIG.GRID_ROWS; row++) {
                    this.grid[row] = [];
                    for (let col = 0; col < CONFIG.GRID_COLS; col++) {
                        this.grid[row][col] = null;
                    }
                }
            }

            initLawnMowers() {
                this.lawnMowers = [];
                for (let row = 0; row < CONFIG.GRID_ROWS; row++) {
                    this.lawnMowers.push({
                        row: row, x: 15,
                        y: CONFIG.TOP_BAR_HEIGHT + row * CONFIG.CELL_HEIGHT + CONFIG.CELL_HEIGHT / 2,
                        active: false, triggered: false, speed: 0.4
                    });
                }
            }

            initUI() {
                const plantCards = document.getElementById('plantCards');
                for (const [key, plant] of Object.entries(PLANTS)) {
                    const card = document.createElement('div');
                    card.className = 'plantCard';
                    card.dataset.plant = key;
                    const iconCanvas = document.createElement('canvas');
                    iconCanvas.width = 48; iconCanvas.height = 48;
                    iconCanvas.className = 'icon';
                    this.drawPlantIcon(iconCanvas, key);
                    card.innerHTML = `<div class="cooldownOverlay"></div><div class="cooldownText"></div><div class="cost">${plant.cost}</div>`;
                    card.insertBefore(iconCanvas, card.querySelector('.cost'));
                    card.title = `${plant.name} - ${plant.cost}阳光`;
                    card.addEventListener('click', () => this.selectPlant(key));
                    plantCards.appendChild(card);
                }
                
                document.getElementById('shovelBtn').addEventListener('click', () => this.toggleShovel());
                document.getElementById('pauseBtn').addEventListener('click', () => this.togglePause());
                document.getElementById('speedBtn').addEventListener('click', () => this.toggleSpeed());
            }

            drawPlantIcon(canvas, type) {
                const ctx = canvas.getContext('2d');
                ctx.save(); ctx.translate(24, 28); ctx.scale(0.6, 0.6);
                const tempCtx = this.ctx; this.ctx = ctx;
                if (type === 'sunflower') this.drawSunflower(0);
                else if (type === 'peashooter') this.drawPeashooter(0, false);
                else if (type === 'wallnut') this.drawWallnut({health: 4000, maxHealth: 4000});
                else if (type === 'snowpea') this.drawPeashooter(0, true);
                else if (type === 'cherrybomb') this.drawCherryBomb(0);
                else if (type === 'repeater') this.drawRepeater(0);
                this.ctx = tempCtx; ctx.restore();
            }

            setupEventListeners() {
                this.canvas.addEventListener('click', (e) => this.handleClick(e));
                document.addEventListener('click', () => sound.init(), { once: true });
            }

            showMainMenu() {
                document.getElementById('mainMenu').style.display = 'flex';
                document.getElementById('gameMenu').style.display = 'none';
                document.getElementById('settingsPanel').style.display = 'none';
                document.getElementById('pauseMenu').style.display = 'none';
                document.getElementById('gardenPanel').style.display = 'none';
                document.getElementById('shopPanel').style.display = 'none';
            }

            hideMainMenu() { document.getElementById('mainMenu').style.display = 'none'; }

            showAdventureStart() {
                this.hideMainMenu();
                document.getElementById('gameMenu').style.display = 'block';
                sound.playBGM();
            }

            showSettings() { document.getElementById('settingsPanel').style.display = 'block'; }
            closeSettings() { document.getElementById('settingsPanel').style.display = 'none'; }

            showGarden() {
                this.hideMainMenu();
                document.getElementById('gardenPanel').style.display = 'block';
                document.getElementById('seedCount').textContent = this.seeds;
                this.renderGarden();
            }

            closeGarden() {
                document.getElementById('gardenPanel').style.display = 'none';
                this.showMainMenu();
            }

            renderGarden() {
                const grid = document.getElementById('gardenGrid');
                grid.innerHTML = '';
                for (let i = 0; i < this.gardenSlots; i++) {
                    const slot = document.createElement('div');
                    slot.className = 'gardenSlot' + (this.gardenPlants[i] ? ' hasPlant' : '');
                    if (this.gardenPlants[i]) {
                        const plant = this.gardenPlants[i];
                        slot.innerHTML = `<canvas width="60" height="60"></canvas>`;
                        const ctx = slot.querySelector('canvas').getContext('2d');
                        ctx.save(); ctx.translate(30, 35); ctx.scale(0.5, 0.5);
                        const tempCtx = this.ctx; this.ctx = ctx;
                        if (plant.type === 'sunflower') this.drawSunflower(Date.now()/1000);
                        else if (plant.type === 'peashooter') this.drawPeashooter(Date.now()/1000, false);
                        else if (plant.type === 'wallnut') this.drawWallnut({health: 4000, maxHealth: 4000});
                        else if (plant.type === 'snowpea') this.drawPeashooter(Date.now()/1000, true);
                        else if (plant.type === 'cherrybomb') this.drawCherryBomb(Date.now()/1000);
                        else if (plant.type === 'repeater') this.drawRepeater(Date.now()/1000);
                        this.ctx = tempCtx; ctx.restore();
                        slot.title = `${plant.name} - 成熟度: ${Math.floor(plant.growth || 0)}%`;
                    } else {
                        slot.innerHTML = '<span style="color:#8B4513;font-size:24px">+</span>';
                        slot.title = '点击种植';
                    }
                    slot.addEventListener('click', () => this.plantInGarden(i));
                    grid.appendChild(slot);
                }
            }

            plantInGarden(slotIndex) {
                if (this.gardenPlants[slotIndex]) {
                    const plant = this.gardenPlants[slotIndex];
                    if ((plant.growth || 0) >= 100) {
                        this.coins += 100;
                        this.gardenPlants[slotIndex] = null;
                        this.saveProgress();
                        this.renderGarden();
                        sound.coinCollectSound();
                    }
                    return;
                }
                if (this.seeds > 0) {
                    this.seeds--;
                    const types = Object.keys(PLANTS);
                    const randomType = types[Math.floor(Math.random() * types.length)];
                    this.gardenPlants[slotIndex] = { type: randomType, name: PLANTS[randomType].name, growth: 0, planted: Date.now() };
                    this.saveProgress();
                    document.getElementById('seedCount').textContent = this.seeds;
                    this.renderGarden();
                    sound.plantSound();
                }
            }

            updateGarden() {
                const now = Date.now();
                let updated = false;
                for (let i = 0; i < this.gardenPlants.length; i++) {
                    const plant = this.gardenPlants[i];
                    if (plant && (plant.growth || 0) < 100) {
                        const elapsed = now - plant.planted;
                        plant.growth = Math.min(100, elapsed / 60000 * 10);
                        updated = true;
                    }
                }
                if (updated) this.saveProgress();
            }

            showShop() {
                this.hideMainMenu();
                document.getElementById('shopPanel').style.display = 'block';
                document.getElementById('shopCoins').textContent = this.coins;
                this.renderShop();
            }

            closeShop() {
                document.getElementById('shopPanel').style.display = 'none';
                this.showMainMenu();
            }

            renderShop() {
                const grid = document.getElementById('shopGrid');
                grid.innerHTML = '';
                for (const item of SHOP_ITEMS) {
                    const div = document.createElement('div');
                    const owned = this.ownedSkins.includes(item.id);
                    div.className = 'shopItem' + (owned ? ' owned' : '');
                    div.innerHTML = `
                        <div style="font-weight:bold;margin-bottom:5px">${item.name}</div>
                        <div style="font-size:12px;color:#aaa">${item.desc}</div>
                        <div class="price">${owned ? '已拥有' : '🪙 ' + item.price}</div>
                    `;
                    if (!owned) {
                        div.addEventListener('click', () => this.buyItem(item));
                    }
                    grid.appendChild(div);
                }
            }

            buyItem(item) {
                if (this.coins >= item.price) {
                    this.coins -= item.price;
                    if (item.type === 'skin') {
                        this.ownedSkins.push(item.id);
                    } else if (item.type === 'slot') {
                        this.gardenSlots += 5;
                    }
                    this.saveProgress();
                    document.getElementById('shopCoins').textContent = this.coins;
                    this.renderShop();
                    sound.coinCollectSound();
                }
            }

            setBGMVolume(value) { sound.setBGMVolume(value / 100); }
            setSFXVolume(value) { sound.setSFXVolume(value / 100); }
            setDifficulty(value) { this.difficulty = value; }

            togglePause() {
                if (!this.gameRunning) return;
                this.paused = !this.paused;
                document.getElementById('pauseMenu').style.display = this.paused ? 'block' : 'none';
                if (this.paused) sound.pauseBGM(); else sound.playBGM();
            }

            resume() { this.paused = false; document.getElementById('pauseMenu').style.display = 'none'; sound.playBGM(); }

            toggleSpeed() {
                this.gameSpeed = this.gameSpeed === 1 ? 2 : 1;
                document.getElementById('speedBtn').textContent = this.gameSpeed + 'x';
                document.getElementById('speedBtn').classList.toggle('active', this.gameSpeed === 2);
            }

            restart() { this.hideMenu(); this.start(); }
            backToMenu() { this.gameRunning = false; sound.pauseBGM(); this.showMainMenu(); }

            selectPlant(plantType) {
                if (this.cooldowns[plantType] && this.cooldowns[plantType] > Date.now()) return;
                if (this.sunCount < PLANTS[plantType].cost) return;
                this.shovelSelected = false;
                document.getElementById('shovelBtn').classList.remove('selected');
                if (this.selectedPlant === plantType) {
                    this.selectedPlant = null;
                    document.querySelectorAll('.plantCard').forEach(c => c.classList.remove('selected'));
                } else {
                    this.selectedPlant = plantType;
                    document.querySelectorAll('.plantCard').forEach(c => c.classList.toggle('selected', c.dataset.plant === plantType));
                }
            }

            toggleShovel() {
                this.selectedPlant = null;
                document.querySelectorAll('.plantCard').forEach(c => c.classList.remove('selected'));
                this.shovelSelected = !this.shovelSelected;
                document.getElementById('shovelBtn').classList.toggle('selected', this.shovelSelected);
            }

            handleClick(e) {
                if (!this.gameRunning || this.gameOver || this.gameWon || this.paused) return;
                const rect = this.canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                for (let i = this.suns.length - 1; i >= 0; i--) {
                    const sun = this.suns[i];
                    if (Math.sqrt((x - sun.x) ** 2 + (y - sun.y) ** 2) < 30) {
                        this.sunCount += CONFIG.SUN_VALUE;
                        this.updateSunCounter();
                        this.suns.splice(i, 1);
                        sound.sunCollectSound();
                        return;
                    }
                }
                
                for (let i = this.coins_game.length - 1; i >= 0; i--) {
                    const coin = this.coins_game[i];
                    if (Math.sqrt((x - coin.x) ** 2 + (y - coin.y) ** 2) < 20) {
                        this.coins += coin.value;
                        this.updateCoinCounter();
                        this.coins_game.splice(i, 1);
                        this.saveProgress();
                        sound.coinCollectSound();
                        return;
                    }
                }
                
                for (let i = this.seeds_game.length - 1; i >= 0; i--) {
                    const seed = this.seeds_game[i];
                    if (Math.sqrt((x - seed.x) ** 2 + (y - seed.y) ** 2) < 20) {
                        this.seeds++;
                        this.seeds_game.splice(i, 1);
                        this.saveProgress();
                        sound.seedDropSound();
                        return;
                    }
                }
                
                const col = Math.floor((x - CONFIG.GRID_OFFSET_X) / CONFIG.CELL_WIDTH);
                const row = Math.floor((y - CONFIG.TOP_BAR_HEIGHT) / CONFIG.CELL_HEIGHT);
                if (row < 0 || row >= CONFIG.GRID_ROWS || col < 0 || col >= CONFIG.GRID_COLS) return;
                
                if (this.shovelSelected) {
                    if (this.grid[row][col]) {
                        const plant = this.grid[row][col];
                        this.plants = this.plants.filter(p => p !== plant);
                        this.grid[row][col] = null;
                        this.shovelSelected = false;
                        document.getElementById('shovelBtn').classList.remove('selected');
                        sound.plantSound();
                    }
                    return;
                }
                
                if (this.selectedPlant && !this.grid[row][col]) {
                    const plantData = PLANTS[this.selectedPlant];
                    if (this.sunCount >= plantData.cost) this.plantAt(row, col, this.selectedPlant);
                }
            }

            plantAt(row, col, type) {
                const plantData = PLANTS[type];
                this.sunCount -= plantData.cost;
                this.updateSunCounter();
                const plant = {
                    type, row, col,
                    x: CONFIG.GRID_OFFSET_X + col * CONFIG.CELL_WIDTH + CONFIG.CELL_WIDTH / 2,
                    y: CONFIG.TOP_BAR_HEIGHT + row * CONFIG.CELL_HEIGHT + CONFIG.CELL_HEIGHT / 2,
                    health: plantData.health, maxHealth: plantData.health,
                    lastFire: 0, lastSun: Date.now(), frame: 0, animTimer: 0, planted: true,
                    skin: this.ownedSkins.find(s => s.startsWith(type + '_') || s.includes(type))
                };
                this.plants.push(plant);
                this.grid[row][col] = plant;
                this.cooldowns[type] = Date.now() + plantData.cooldown;
                this.selectedPlant = null;
                document.querySelectorAll('.plantCard').forEach(c => c.classList.remove('selected'));
                sound.plantSound();
                if (type === 'cherrybomb') setTimeout(() => this.explodeCherryBomb(plant), 500);
            }

            explodeCherryBomb(plant) {
                const radius = CONFIG.CELL_WIDTH * 1.5;
                this.zombies = this.zombies.filter(z => {
                    const dist = Math.sqrt((z.x - plant.x) ** 2 + (z.y - plant.y) ** 2);
                    if (dist < radius) { this.addParticles(z.x, z.y, '#ff0000', 10); return false; }
                    return true;
                });
                this.addParticles(plant.x, plant.y, '#ff6600', 20);
                this.addParticles(plant.x, plant.y, '#ffff00', 20);
                sound.explosionSound();
                this.grid[plant.row][plant.col] = null;
                this.plants = this.plants.filter(p => p !== plant);
            }

            updateSunCounter() { document.getElementById('sunCounter').textContent = '☀️ ' + this.sunCount; }
            updateCoinCounter() { document.getElementById('coinCounter').textContent = '🪙 ' + this.coins; }

            updateCooldowns() {
                const now = Date.now();
                document.querySelectorAll('.plantCard').forEach(card => {
                    const plantType = card.dataset.plant;
                    const plantData = PLANTS[plantType];
                    const cooldownEnd = this.cooldowns[plantType] || 0;
                    const onCooldown = cooldownEnd > now;
                    const canAfford = this.sunCount >= plantData.cost;
                    const overlay = card.querySelector('.cooldownOverlay');
                    const textEl = card.querySelector('.cooldownText');
                    if (onCooldown) {
                        const remaining = (cooldownEnd - now) / 1000;
                        overlay.style.height = `${((cooldownEnd - now) / plantData.cooldown) * 100}%`;
                        textEl.textContent = Math.ceil(remaining) + 's';
                        textEl.style.display = 'block';
                        card.classList.add('disabled');
                    } else if (!canAfford) {
                        overlay.style.height = '100%'; textEl.style.display = 'none';
                        card.classList.add('disabled');
                    } else {
                        overlay.style.height = '0%'; textEl.style.display = 'none';
                        card.classList.remove('disabled');
                    }
                });
            }

            spawnZombie() {
                const row = Math.floor(Math.random() * CONFIG.GRID_ROWS);
                let type = 'normal';
                const rand = Math.random();
                const diffMultiplier = this.difficulty === 'easy' ? 0.7 : this.difficulty === 'hard' ? 1.3 : 1;
                if (this.wave >= 3 && rand > 0.7) type = 'cone';
                if (this.wave >= 5 && rand > 0.85) type = 'bucket';
                if (this.wave >= 4 && rand > 0.6 && rand <= 0.75) type = 'polevault';
                if (this.wave === this.totalWaves && rand > 0.9) type = 'flag';
                const zombieData = ZOMBIES[type];
                this.zombies.push({
                    type, row,
                    x: CONFIG.CANVAS_WIDTH + 20,
                    y: CONFIG.TOP_BAR_HEIGHT + row * CONFIG.CELL_HEIGHT + CONFIG.CELL_HEIGHT / 2,
                    health: zombieData.health * diffMultiplier,
                    maxHealth: zombieData.health * diffMultiplier,
                    speed: zombieData.speed, damage: zombieData.damage,
                    attacking: false, slowed: false, slowTimer: 0, frame: 0, animTimer: 0,
                    canJump: zombieData.canJump || false, hasJumped: false, jumping: false, jumpProgress: 0
                });
                this.zombiesInWave++;
            }

            spawnSun(fromPlant = null) {
                const sun = fromPlant ? {
                    x: fromPlant.x + (Math.random() - 0.5) * 40,
                    y: fromPlant.y - 20,
                    targetY: fromPlant.y + 20,
                    falling: true, lifetime: 8000, created: Date.now()
                } : {
                    x: Math.random() * (CONFIG.CANVAS_WIDTH - 100) + 50,
                    y: -20,
                    targetY: Math.random() * (CONFIG.CANVAS_HEIGHT - 200) + CONFIG.TOP_BAR_HEIGHT + 50,
                    falling: true, lifetime: 10000, created: Date.now()
                };
                this.suns.push(sun);
            }

            spawnCoin(x, y) {
                const isGold = Math.random() > 0.3;
                this.coins_game.push({
                    x, y, value: isGold ? 10 : 5,
                    isGold, targetY: y + 30,
                    falling: true, lifetime: 15000, created: Date.now()
                });
            }

            spawnSeed(x, y) {
                this.seeds_game.push({
                    x, y, targetY: y + 30,
                    falling: true, lifetime: 20000, created: Date.now()
                });
            }

            shoot(plant) {
                const plantData = PLANTS[plant.type];
                const projectile = {
                    x: plant.x + 30, y: plant.y, row: plant.row,
                    speed: 5, damage: plantData.damage,
                    type: plant.type === 'snowpea' ? 'frozen' : 'pea',
                    slowEffect: plantData.slowEffect || 0
                };
                this.projectiles.push(projectile);
                sound.shootSound();
                if (plant.type === 'repeater') {
                    setTimeout(() => {
                        if (this.plants.includes(plant)) {
                            this.projectiles.push({...projectile, x: plant.x + 30});
                            sound.shootSound();
                        }
                    }, 150);
                }
            }

            addParticles(x, y, color, count) {
                for (let i = 0; i < count; i++) {
                    this.particles.push({
                        x, y,
                        vx: (Math.random() - 0.5) * 8,
                        vy: (Math.random() - 0.5) * 8 - 2,
                        color, life: 1, size: Math.random() * 6 + 2
                    });
                }
            }

            update(deltaTime) {
                if (!this.gameRunning || this.gameOver || this.gameWon || this.paused) return;
                deltaTime *= this.gameSpeed;
                const now = Date.now();
                
                this.updateCooldowns();
                this.updateGarden();
                
                if (now - this.lastSunDrop > CONFIG.SUN_INTERVAL) { this.spawnSun(); this.lastSunDrop = now; }
                if (this.waveInProgress && now - this.lastZombieSpawn > 3000 / this.gameSpeed) {
                    if (this.zombiesInWave < this.getZombiesForWave(this.wave)) { this.spawnZombie(); this.lastZombieSpawn = now; }
                }
                if (this.waveInProgress && this.zombies.length === 0 && this.zombiesInWave >= this.getZombiesForWave(this.wave)) {
                    if (this.wave >= this.totalWaves) {
                        this.gameWon = true; this.gameRunning = false;
                        sound.winSound();
                        this.showMenu('胜利！', '恭喜你保卫了花园！');
                        return;
                    }
                    this.nextWave();
                }
                
                for (let i = this.suns.length - 1; i >= 0; i--) {
                    const sun = this.suns[i];
                    if (sun.falling && sun.y < sun.targetY) sun.y += 1;
                    if (now - sun.created > sun.lifetime) this.suns.splice(i, 1);
                }
                
                for (let i = this.coins_game.length - 1; i >= 0; i--) {
                    const coin = this.coins_game[i];
                    if (coin.falling && coin.y < coin.targetY) coin.y += 1;
                    if (now - coin.created > coin.lifetime) this.coins_game.splice(i, 1);
                }
                
                for (let i = this.seeds_game.length - 1; i >= 0; i--) {
                    const seed = this.seeds_game[i];
                    if (seed.falling && seed.y < seed.targetY) seed.y += 1;
                    if (now - seed.created > seed.lifetime) this.seeds_game.splice(i, 1);
                }
                
                for (const plant of this.plants) {
                    const plantData = PLANTS[plant.type];
                    if (plant.type === 'sunflower') {
                        if (now - plant.lastSun > plantData.sunInterval) { this.spawnSun(plant); plant.lastSun = now; }
                    } else if (['peashooter', 'snowpea', 'repeater'].includes(plant.type)) {
                        const hasZombieInRow = this.zombies.some(z => z.row === plant.row && z.x < CONFIG.CANVAS_WIDTH && z.x > plant.x);
                        if (hasZombieInRow && now - plant.lastFire > plantData.fireRate) { this.shoot(plant); plant.lastFire = now; }
                    }
                    plant.animTimer += deltaTime;
                    if (plant.animTimer > 200) { plant.frame = (plant.frame + 1) % 2; plant.animTimer = 0; }
                }
                
                for (let i = this.projectiles.length - 1; i >= 0; i--) {
                    const proj = this.projectiles[i];
                    proj.x += proj.speed * this.gameSpeed;
                    if (proj.x > CONFIG.CANVAS_WIDTH) { this.projectiles.splice(i, 1); continue; }
                    for (const zombie of this.zombies) {
                        if (zombie.row === proj.row && Math.abs(zombie.x - proj.x) < 25) {
                            zombie.health -= proj.damage;
                            if (proj.slowEffect) { zombie.slowed = true; zombie.slowTimer = now + 5000; }
                            this.addParticles(proj.x, proj.y, proj.type === 'frozen' ? '#87CEEB' : '#90EE90', 3);
                            this.projectiles.splice(i, 1);
                            sound.hitSound();
                            break;
                        }
                    }
                }
                
                for (let i = this.zombies.length - 1; i >= 0; i--) {
                    const zombie = this.zombies[i];
                    if (zombie.health <= 0) {
                        this.addParticles(zombie.x, zombie.y, '#666666', 10);
                        this.zombies.splice(i, 1);
                        this.zombiesKilled++;
                        sound.zombieDeathSound();
                        if (Math.random() < 0.15) this.spawnCoin(zombie.x, zombie.y);
                        if (Math.random() < 0.01) this.spawnSeed(zombie.x, zombie.y);
                        continue;
                    }
                    if (zombie.slowed && now > zombie.slowTimer) zombie.slowed = false;
                    const speed = zombie.slowed ? zombie.speed * 0.5 : zombie.speed;
                    let blocked = false;
                    
                    if (zombie.jumping) {
                        zombie.jumpProgress += deltaTime / 500;
                        if (zombie.jumpProgress >= 1) {
                            zombie.jumping = false; zombie.hasJumped = true;
                            zombie.speed = 0.015; zombie.x -= CONFIG.CELL_WIDTH * 1.5;
                        }
                    } else if (zombie.canJump && !zombie.hasJumped) {
                        const plantAhead = this.plants.find(p => p.row === zombie.row && p.x < zombie.x && zombie.x - p.x < 80);
                        if (plantAhead) { zombie.jumping = true; zombie.jumpProgress = 0; }
                        else zombie.x -= speed * deltaTime;
                    } else {
                        for (const plant of this.plants) {
                            if (plant.row === zombie.row && Math.abs(plant.x - zombie.x) < 40) {
                                blocked = true; zombie.attacking = true;
                                plant.health -= zombie.damage * deltaTime / 1000;
                                if (plant.health <= 0) {
                                    this.addParticles(plant.x, plant.y, '#90EE90', 8);
                                    this.grid[plant.row][plant.col] = null;
                                    this.plants = this.plants.filter(p => p !== plant);
                                }
                                break;
                            }
                        }
                        if (!blocked) { zombie.attacking = false; zombie.x -= speed * deltaTime; }
                    }
                    
                    const mower = this.lawnMowers[zombie.row];
                    if (mower && !mower.triggered && zombie.x < CONFIG.GRID_OFFSET_X + CONFIG.CELL_WIDTH / 2) {
                        mower.triggered = true; mower.active = true;
                    }
                    if (zombie.x < -20) {
                        const hasMower = this.lawnMowers[zombie.row] && !this.lawnMowers[zombie.row].triggered;
                        if (!hasMower) {
                            this.gameOver = true; this.gameRunning = false;
                            sound.gameOverSound();
                            this.showMenu('游戏结束', '僵尸吃掉了你的脑子！');
                            return;
                        }
                    }
                    zombie.animTimer += deltaTime;
                    if (zombie.animTimer > 150) { zombie.frame = (zombie.frame + 1) % 2; zombie.animTimer = 0; }
                }
                
                for (let i = this.lawnMowers.length - 1; i >= 0; i--) {
                    const mower = this.lawnMowers[i];
                    if (mower.active) {
                        mower.x += mower.speed * deltaTime;
                        this.zombies = this.zombies.filter(zombie => {
                            if (zombie.row === mower.row && Math.abs(zombie.x - mower.x) < 40) {
                                this.addParticles(zombie.x, zombie.y, '#666666', 8);
                                sound.zombieDeathSound();
                                if (Math.random() < 0.2) this.spawnCoin(zombie.x, zombie.y);
                                return false;
                            }
                            return true;
                        });
                        if (mower.x > CONFIG.CANVAS_WIDTH + 50) this.lawnMowers.splice(i, 1);
                    }
                }
                
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life -= 0.02;
                    if (p.life <= 0) this.particles.splice(i, 1);
                }
            }

            getZombiesForWave(wave) {
                let base = wave === 1 ? 2 : 3 + (wave - 1) * 2;
                if (this.difficulty === 'easy') base = Math.floor(base * 0.8);
                if (this.difficulty === 'hard') base = Math.floor(base * 1.3);
                return base;
            }

            nextWave() {
                this.wave++;
                this.zombiesInWave = 0;
                this.waveInProgress = true;
                this.lastZombieSpawn = Date.now();
                document.getElementById('waveInfo').textContent = `波次: ${this.wave}/${this.totalWaves}`;
                sound.waveSound();
                for (let i = 0; i < (this.wave === 1 ? 1 : 2); i++) this.spawnZombie();
            }

            render() {
                this.ctx.clearRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);
                this.drawLawn();
                for (const mower of this.lawnMowers) this.drawLawnMower(mower);
                for (const plant of this.plants) this.drawPlant(plant);
                for (const projectile of this.projectiles) this.drawProjectile(projectile);
                for (const zombie of this.zombies) this.drawZombie(zombie);
                for (const sun of this.suns) this.drawSun(sun);
                for (const coin of this.coins_game) this.drawCoin(coin);
                for (const seed of this.seeds_game) this.drawSeed(seed);
                for (const p of this.particles) {
                    this.ctx.globalAlpha = p.life;
                    this.ctx.fillStyle = p.color;
                    this.ctx.beginPath();
                    this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    this.ctx.fill();
                    this.ctx.globalAlpha = 1;
                }
                if (this.selectedPlant) {
                    this.ctx.strokeStyle = 'rgba(255, 255, 0, 0.5)';
                    this.ctx.lineWidth = 2;
                    this.ctx.setLineDash([5, 5]);
                    for (let row = 0; row < CONFIG.GRID_ROWS; row++) {
                        for (let col = 0; col < CONFIG.GRID_COLS; col++) {
                            if (!this.grid[row][col]) {
                                this.ctx.strokeRect(CONFIG.GRID_OFFSET_X + col * CONFIG.CELL_WIDTH + 2, CONFIG.TOP_BAR_HEIGHT + row * CONFIG.CELL_HEIGHT + 2, CONFIG.CELL_WIDTH - 4, CONFIG.CELL_HEIGHT - 4);
                            }
                        }
                    }
                    this.ctx.setLineDash([]);
                }
            }

            drawLawn() {
                for (let row = 0; row < CONFIG.GRID_ROWS; row++) {
                    for (let col = 0; col < CONFIG.GRID_COLS; col++) {
                        const x = CONFIG.GRID_OFFSET_X + col * CONFIG.CELL_WIDTH;
                        const y = CONFIG.TOP_BAR_HEIGHT + row * CONFIG.CELL_HEIGHT;
                        const isLight = (row + col) % 2 === 0;
                        this.ctx.fillStyle = isLight ? '#5d8a3e' : '#4a7c23';
                        this.ctx.fillRect(x, y, CONFIG.CELL_WIDTH, CONFIG.CELL_HEIGHT);
                        this.ctx.strokeStyle = 'rgba(0, 0, 0, 0.1)';
                        this.ctx.strokeRect(x, y, CONFIG.CELL_WIDTH, CONFIG.CELL_HEIGHT);
                    }
                }
            }

            drawPlant(plant) {
                const x = plant.x;
                const y = plant.y + Math.sin(Date.now() / 300 + plant.col) * 3;
                const time = Date.now() / 1000;
                this.ctx.save();
                this.ctx.translate(x, y);
                
                const skin = plant.skin;
                if (plant.type === 'sunflower') this.drawSunflower(time, skin);
                else if (plant.type === 'peashooter') this.drawPeashooter(time, skin === 'golden_peashooter');
                else if (plant.type === 'snowpea') this.drawPeashooter(time, true, skin === 'shadow_snowpea');
                else if (plant.type === 'wallnut') this.drawWallnut(plant, skin === 'ice_wallnut');
                else if (plant.type === 'cherrybomb') this.drawCherryBomb(time);
                else if (plant.type === 'repeater') this.drawRepeater(time, skin === 'diamond_repeater');
                
                this.ctx.restore();
                if (plant.health < plant.maxHealth) {
                    this.ctx.fillStyle = '#333';
                    this.ctx.fillRect(x - 25, y + 30, 50, 6);
                    this.ctx.fillStyle = '#4CAF50';
                    this.ctx.fillRect(x - 25, y + 30, 50 * (plant.health / plant.maxHealth), 6);
                }
            }

            drawSunflower(time, skin) {
                const isFire = skin === 'fire_sunflower';
                this.ctx.fillStyle = '#228B22';
                this.ctx.fillRect(-3, 5, 6, 25);
                this.ctx.fillStyle = '#32CD32';
                this.ctx.beginPath();
                this.ctx.ellipse(-15, 20, 8, 15, -0.3, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.beginPath();
                this.ctx.ellipse(15, 20, 8, 15, 0.3, 0, Math.PI * 2);
                this.ctx.fill();
                const petalCount = 12;
                for (let i = 0; i < petalCount; i++) {
                    const angle = (i / petalCount) * Math.PI * 2 + Math.sin(time * 2) * 0.1;
                    const petalX = Math.cos(angle) * 18;
                    const petalY = Math.sin(angle) * 18 - 5;
                    this.ctx.fillStyle = isFire ? '#FF4500' : '#FFD700';
                    this.ctx.beginPath();
                    this.ctx.ellipse(petalX, petalY, 8, 12, angle, 0, Math.PI * 2);
                    this.ctx.fill();
                    if (isFire) {
                        this.ctx.fillStyle = 'rgba(255, 200, 0, 0.5)';
                        this.ctx.beginPath();
                        this.ctx.ellipse(petalX * 0.7, petalY * 0.7, 4, 6, angle, 0, Math.PI * 2);
                        this.ctx.fill();
                    }
                }
                this.ctx.fillStyle = isFire ? '#8B0000' : '#8B4513';
                this.ctx.beginPath();
                this.ctx.arc(0, -5, 12, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.fillStyle = '#000';
                this.ctx.beginPath();
                this.ctx.arc(-4, -7, 2, 0, Math.PI * 2);
                this.ctx.arc(4, -7, 2, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.fillStyle = '#8B0000';
                this.ctx.beginPath();
                this.ctx.arc(0, -3, 3, 0, Math.PI);
                this.ctx.fill();
            }

            drawPeashooter(time, isSnow, isShadow = false) {
                let color = isShadow ? '#2d0a4e' : (isSnow ? '#00BCD4' : '#4CAF50');
                let darkColor = isShadow ? '#1a0530' : (isSnow ? '#00838F' : '#2E7D32');
                if (this.currentPlantSkin === 'golden_peashooter') { color = '#FFD700'; darkColor = '#B8860B'; }
                
                this.ctx.fillStyle = darkColor;
                this.ctx.beginPath();
                this.ctx.moveTo(-10, 10);
                this.ctx.lineTo(-5, 30);
                this.ctx.lineTo(5, 30);
                this.ctx.lineTo(10, 10);
                this.ctx.closePath();
                this.ctx.fill();
                
                this.ctx.fillStyle = color;
                this.ctx.beginPath();
                this.ctx.arc(0, 5, 18, 0, Math.PI * 2);
                this.ctx.fill();
                
                this.ctx.fillStyle = darkColor;
                this.ctx.beginPath();
                this.ctx.ellipse(15, 0, 12, 8, 0, 0, Math.PI * 2);
                this.ctx.fill();
                
                this.ctx.fillStyle = '#1a1a1a';
                this.ctx.beginPath();
                this.ctx.arc(20, 0, 6, 0, Math.PI * 2);
                this.ctx.fill();
                
                this.ctx.fillStyle = '#000';
                this.ctx.beginPath();
                this.ctx.arc(-5, 0, 3, 0, Math.PI * 2);
                this.ctx.arc(5, 0, 3, 0, Math.PI * 2);
                this.ctx.fill();
                
                this.ctx.fillStyle = '#FF69B4';
                this.ctx.beginPath();
                this.ctx.arc(0, 8, 4, 0, Math.PI);
                this.ctx.fill();
            }

            drawWallnut(plant, isIce = false) {
                const healthRatio = plant.health / plant.maxHealth;
                this.ctx.fillStyle = isIce ? '#87CEEB' : '#D2691E';
                this.ctx.beginPath();
                this.ctx.arc(0, 5, 25, 0, Math.PI * 2);
                this.ctx.fill();
                if (isIce) {
                    this.ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                    this.ctx.beginPath();
                    this.ctx.arc(-8, -5, 10, 0, Math.PI * 2);
                    this.ctx.fill();
                }
                this.ctx.fillStyle = isIce ? '#4169E1' : '#8B4513';
                this.ctx.beginPath();
                this.ctx.arc(-5, 8, 8, 0, Math.PI * 2);
                this.ctx.arc(8, 0, 5, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.fillStyle = '#000';
                if (healthRatio > 0.66) {
                    this.ctx.beginPath();
                    this.ctx.arc(-8, -5, 4, 0, Math.PI * 2);
                    this.ctx.arc(8, -5, 4, 0, Math.PI * 2);
                    this.ctx.fill();
                    this.ctx.strokeStyle = '#000';
                    this.ctx.lineWidth = 2;
                    this.ctx.beginPath();
                    this.ctx.arc(0, 5, 8, 0.2, Math.PI - 0.2);
                    this.ctx.stroke();
                } else if (healthRatio > 0.33) {
                    this.ctx.beginPath();
                    this.ctx.arc(-8, -5, 4, 0, Math.PI * 2);
                    this.ctx.arc(8, -5, 4, 0, Math.PI * 2);
                    this.ctx.fill();
                } else {
                    this.ctx.beginPath();
                    this.ctx.arc(-8, -5, 3, 0, Math.PI * 2);
                    this.ctx.arc(8, -5, 3, 0, Math.PI * 2);
                    this.ctx.fill();
                }
            }

            drawCherryBomb(time) {
                const bounce = Math.abs(Math.sin(time * 10)) * 3;
                this.ctx.fillStyle = '#DC143C';
                this.ctx.beginPath();
                this.ctx.arc(-10, 5 - bounce, 18, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.fillStyle = '#B22222';
                this.ctx.beginPath();
                this.ctx.arc(12, 8 - bounce, 15, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.strokeStyle = '#228B22';
                this.ctx.lineWidth = 3;
                this.ctx.beginPath();
                this.ctx.moveTo(-10, -13 - bounce);
                this.ctx.quadraticCurveTo(0, -25 - bounce, 5, -20 - bounce);
                this.ctx.stroke();
                this.ctx.fillStyle = '#000';
                this.ctx.beginPath();
                this.ctx.arc(-15, 0 - bounce, 3, 0, Math.PI * 2);
                this.ctx.arc(-5, 0 - bounce, 3, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.fillStyle = '#fff';
                this.ctx.beginPath();
                this.ctx.arc(-16, -1 - bounce, 1.5, 0, Math.PI * 2);
                this.ctx.arc(-6, -1 - bounce, 1.5, 0, Math.PI * 2);
                this.ctx.fill();
            }

            drawRepeater(time, isDiamond = false) {
                const color = isDiamond ? '#00CED1' : '#4CAF50';
                const darkColor = isDiamond ? '#008B8B' : '#2E7D32';
                
                this.ctx.fillStyle = darkColor;
                this.ctx.beginPath();
                this.ctx.moveTo(-10, 10);
                this.ctx.lineTo(-5, 30);
                this.ctx.lineTo(5, 30);
                this.ctx.lineTo(10, 10);
                this.ctx.closePath();
                this.ctx.fill();
                
                this.ctx.fillStyle = color;
                this.ctx.beginPath();
                this.ctx.arc(0, 5, 18, 0, Math.PI * 2);
                this.ctx.fill();
                
                this.ctx.fillStyle = darkColor;
                this.ctx.beginPath();
                this.ctx.ellipse(12, 0, 10, 7, 0, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.beginPath();
                this.ctx.ellipse(22, 0, 8, 6, 0, 0, Math.PI * 2);
                this.ctx.fill();
                
                this.ctx.fillStyle = '#1a1a1a';
                this.ctx.beginPath();
                this.ctx.arc(27, 0, 5, 0, Math.PI * 2);
                this.ctx.fill();
                
                this.ctx.fillStyle = isDiamond ? '#00CED1' : '#2E7D32';
                this.ctx.beginPath();
                this.ctx.ellipse(0, -18, 10, 6, 0, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.fillStyle = isDiamond ? '#40E0D0' : '#4CAF50';
                this.ctx.beginPath();
                this.ctx.ellipse(0, -20, 8, 4, 0, 0, Math.PI * 2);
                this.ctx.fill();
                
                this.ctx.fillStyle = '#000';
                this.ctx.beginPath();
                this.ctx.arc(-5, 0, 3, 0, Math.PI * 2);
                this.ctx.arc(5, 0, 3, 0, Math.PI * 2);
                this.ctx.fill();
                
                this.ctx.fillStyle = '#FF69B4';
                this.ctx.beginPath();
                this.ctx.arc(0, 8, 4, 0, Math.PI);
                this.ctx.fill();
            }

            drawZombie(zombie) {
                const x = zombie.x;
                const y = zombie.y;
                let yOffset = 0;
                if (zombie.jumping) yOffset = -Math.sin(zombie.jumpProgress * Math.PI) * 50;
                const wobble = zombie.attacking ? Math.sin(Date.now() / 100) * 3 : Math.sin(Date.now() / 300) * 2;
                
                this.ctx.save();
                this.ctx.translate(x, y + wobble + yOffset);
                
                if (zombie.slowed) {
                    this.ctx.fillStyle = 'rgba(135, 206, 235, 0.5)';
                    this.ctx.beginPath();
                    this.ctx.arc(0, 0, 35, 0, Math.PI * 2);
                    this.ctx.fill();
                }
                
                if (zombie.type === 'normal') this.drawNormalZombie();
                else if (zombie.type === 'cone') this.drawConeZombie();
                else if (zombie.type === 'bucket') this.drawBucketZombie();
                else if (zombie.type === 'flag') this.drawFlagZombie();
                else if (zombie.type === 'polevault') this.drawPolevaultZombie(zombie);
                
                this.ctx.restore();
                
                this.ctx.fillStyle = '#333';
                this.ctx.fillRect(x - 20, y - 45 + yOffset, 40, 5);
                this.ctx.fillStyle = zombie.slowed ? '#87CEEB' : '#e74c3c';
                this.ctx.fillRect(x - 20, y - 45 + yOffset, 40 * (zombie.health / zombie.maxHealth), 5);
            }

            drawNormalZombie() {
                this.ctx.strokeStyle = '#2d3436';
                this.ctx.lineWidth = 2;
                this.ctx.fillStyle = '#4a5568';
                this.ctx.beginPath();
                this.ctx.ellipse(0, 28, 14, 20, 0, 0, Math.PI * 2);
                this.ctx.fill(); this.ctx.stroke();
                this.ctx.fillStyle = '#2d3748';
                this.ctx.fillRect(-12, 35, 8, 15);
                this.ctx.fillRect(4, 35, 8, 15);
                this.ctx.fillStyle = '#718096';
                this.ctx.fillRect(-28, 18, 10, 6);
                this.ctx.fillRect(18, 18, 10, 6);
                this.ctx.fillStyle = '#7B8B6F';
                this.ctx.beginPath();
                this.ctx.ellipse(0, 0, 18, 20, 0, 0, Math.PI * 2);
                this.ctx.fill(); this.ctx.stroke();
                this.ctx.fillStyle = '#6B7B5F';
                this.ctx.beginPath();
                this.ctx.ellipse(-8, -18, 8, 10, -0.2, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.beginPath();
                this.ctx.ellipse(6, -16, 7, 8, 0.3, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.fillStyle = '#FEDC56';
                this.ctx.beginPath();
                this.ctx.ellipse(-8, -2, 7, 8, 0, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.beginPath();
                this.ctx.ellipse(8, -2, 7, 8, 0, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.fillStyle = '#E53E3E';
                this.ctx.beginPath();
                this.ctx.arc(-8, -1, 3, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.beginPath();
                this.ctx.arc(8, -1, 3, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.fillStyle = '#000';
                this.ctx.beginPath();
                this.ctx.arc(-8, -1, 1.5, 0, Math.PI * 2);
                this.ctx.arc(8, -1, 1.5, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.fillStyle = '#2d3436';
                this.ctx.beginPath();
                this.ctx.arc(0, 10, 8, 0, Math.PI);
                this.ctx.fill();
            }

            drawConeZombie() {
                this.drawNormalZombie();
                this.ctx.fillStyle = '#F97316';
                this.ctx.strokeStyle = '#C2410C';
                this.ctx.lineWidth = 2;
                this.ctx.beginPath();
                this.ctx.moveTo(0, -35);
                this.ctx.lineTo(-18, -5);
                this.ctx.lineTo(18, -5);
                this.ctx.closePath();
                this.ctx.fill(); this.ctx.stroke();
                this.ctx.fillStyle = '#FFF';
                this.ctx.fillRect(-12, -12, 24, 4);
                this.ctx.fillRect(-8, -20, 16, 4);
            }

            drawBucketZombie() {
                this.drawNormalZombie();
                this.ctx.fillStyle = '#9CA3AF';
                this.ctx.strokeStyle = '#4B5563';
                this.ctx.lineWidth = 2;
                this.ctx.beginPath();
                this.ctx.moveTo(-16, -8);
                this.ctx.lineTo(-14, -30);
                this.ctx.quadraticCurveTo(0, -35, 14, -30);
                this.ctx.lineTo(16, -8);
                this.ctx.closePath();
                this.ctx.fill(); this.ctx.stroke();
                this.ctx.fillStyle = '#6B7280';
                this.ctx.fillRect(-16, -8, 32, 5);
            }

            drawFlagZombie() {
                this.drawNormalZombie();
                this.ctx.fillStyle = '#8B4513';
                this.ctx.fillRect(10, -30, 3, 50);
                this.ctx.fillStyle = '#ff0000';
                this.ctx.beginPath();
                this.ctx.moveTo(13, -30);
                this.ctx.lineTo(35, -20);
                this.ctx.lineTo(13, -10);
                this.ctx.closePath();
                this.ctx.fill();
            }

            drawPolevaultZombie(zombie) {
                this.ctx.strokeStyle = '#2d3436';
                this.ctx.lineWidth = 2;
                this.ctx.fillStyle = '#4a5568';
                this.ctx.beginPath();
                this.ctx.ellipse(0, 28, 14, 20, 0, 0, Math.PI * 2);
                this.ctx.fill(); this.ctx.stroke();
                this.ctx.fillStyle = '#2d3748';
                this.ctx.fillRect(-12, 35, 8, 15);
                this.ctx.fillRect(4, 35, 8, 15);
                this.ctx.fillStyle = '#7B8B6F';
                this.ctx.beginPath();
                this.ctx.ellipse(0, 0, 18, 20, 0, 0, Math.PI * 2);
                this.ctx.fill(); this.ctx.stroke();
                this.ctx.fillStyle = '#6B7B5F';
                this.ctx.beginPath();
                this.ctx.ellipse(-8, -18, 8, 10, -0.2, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.beginPath();
                this.ctx.ellipse(6, -16, 7, 8, 0.3, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.fillStyle = '#FEDC56';
                this.ctx.beginPath();
                this.ctx.ellipse(-8, -2, 7, 8, 0, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.beginPath();
                this.ctx.ellipse(8, -2, 7, 8, 0, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.fillStyle = '#E53E3E';
                this.ctx.beginPath();
                this.ctx.arc(-8, -1, 3, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.beginPath();
                this.ctx.arc(8, -1, 3, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.fillStyle = '#000';
                this.ctx.beginPath();
                this.ctx.arc(-8, -1, 1.5, 0, Math.PI * 2);
                this.ctx.arc(8, -1, 1.5, 0, Math.PI * 2);
                this.ctx.fill();
                if (!zombie.hasJumped) {
                    this.ctx.strokeStyle = '#8B4513';
                    this.ctx.lineWidth = 4;
                    this.ctx.beginPath();
                    this.ctx.moveTo(-15, 15);
                    this.ctx.lineTo(-45, -10);
                    this.ctx.lineTo(-45, 30);
                    this.ctx.stroke();
                }
            }

            drawProjectile(projectile) {
                this.ctx.beginPath();
                this.ctx.arc(projectile.x, projectile.y, 10, 0, Math.PI * 2);
                this.ctx.fillStyle = projectile.type === 'frozen' ? '#87CEEB' : '#90EE90';
                this.ctx.fill();
                this.ctx.strokeStyle = projectile.type === 'frozen' ? '#4169E1' : '#228B22';
                this.ctx.lineWidth = 2;
                this.ctx.stroke();
                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                this.ctx.beginPath();
                this.ctx.arc(projectile.x - 3, projectile.y - 3, 3, 0, Math.PI * 2);
                this.ctx.fill();
            }

            drawSun(sun) {
                const pulse = Math.sin(Date.now() / 200) * 0.1 + 1;
                const size = 25 * pulse;
                this.ctx.beginPath();
                this.ctx.arc(sun.x, sun.y, size, 0, Math.PI * 2);
                const gradient = this.ctx.createRadialGradient(sun.x, sun.y, 0, sun.x, sun.y, size);
                gradient.addColorStop(0, '#FFFF00');
                gradient.addColorStop(0.7, '#FFD700');
                gradient.addColorStop(1, '#FFA500');
                this.ctx.fillStyle = gradient;
                this.ctx.fill();
                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                this.ctx.beginPath();
                this.ctx.arc(sun.x - 8, sun.y - 8, 6, 0, Math.PI * 2);
                this.ctx.fill();
            }

            drawCoin(coin) {
                const pulse = Math.sin(Date.now() / 150) * 0.1 + 1;
                const size = 12 * pulse;
                this.ctx.beginPath();
                this.ctx.arc(coin.x, coin.y, size, 0, Math.PI * 2);
                const gradient = this.ctx.createRadialGradient(coin.x, coin.y, 0, coin.x, coin.y, size);
                if (coin.isGold) {
                    gradient.addColorStop(0, '#FFD700');
                    gradient.addColorStop(1, '#DAA520');
                } else {
                    gradient.addColorStop(0, '#C0C0C0');
                    gradient.addColorStop(1, '#A0A0A0');
                }
                this.ctx.fillStyle = gradient;
                this.ctx.fill();
                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                this.ctx.beginPath();
                this.ctx.arc(coin.x - 3, coin.y - 3, 3, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.fillStyle = '#8B4513';
                this.ctx.font = 'bold 10px Arial';
                this.ctx.textAlign = 'center';
                this.ctx.textBaseline = 'middle';
                this.ctx.fillText(coin.value, coin.x, coin.y);
            }

            drawSeed(seed) {
                const pulse = Math.sin(Date.now() / 200) * 0.1 + 1;
                const size = 10 * pulse;
                this.ctx.fillStyle = '#8B4513';
                this.ctx.beginPath();
                this.ctx.ellipse(seed.x, seed.y, size, size * 1.3, 0, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.fillStyle = '#90EE90';
                this.ctx.beginPath();
                this.ctx.ellipse(seed.x, seed.y - 5, 3, 5, 0, 0, Math.PI * 2);
                this.ctx.fill();
            }

            drawLawnMower(mower) {
                this.ctx.save();
                this.ctx.translate(mower.x, mower.y);
                this.ctx.fillStyle = '#DC2626';
                this.ctx.strokeStyle = '#991B1B';
                this.ctx.lineWidth = 2;
                this.ctx.beginPath();
                this.ctx.roundRect(-20, -15, 40, 25, 3);
                this.ctx.fill(); this.ctx.stroke();
                this.ctx.fillStyle = '#1F2937';
                this.ctx.fillRect(18, -18, 8, 30);
                this.ctx.fillStyle = '#374151';
                this.ctx.beginPath();
                this.ctx.moveTo(-20, -15);
                this.ctx.lineTo(-25, -20);
                this.ctx.lineTo(-25, -5);
                this.ctx.lineTo(-20, 0);
                this.ctx.closePath();
                this.ctx.fill(); this.ctx.stroke();
                this.ctx.fillStyle = '#EF4444';
                this.ctx.beginPath();
                this.ctx.moveTo(-8, -15);
                this.ctx.lineTo(-12, -22);
                this.ctx.lineTo(8, -22);
                this.ctx.lineTo(4, -15);
                this.ctx.closePath();
                this.ctx.fill(); this.ctx.stroke();
                this.ctx.fillStyle = '#1F2937';
                this.ctx.strokeStyle = '#111827';
                this.ctx.beginPath();
                this.ctx.arc(-12, 15, 8, 0, Math.PI * 2);
                this.ctx.fill(); this.ctx.stroke();
                this.ctx.beginPath();
                this.ctx.arc(12, 15, 8, 0, Math.PI * 2);
                this.ctx.fill(); this.ctx.stroke();
                this.ctx.fillStyle = '#6B7280';
                this.ctx.beginPath();
                this.ctx.arc(-12, 15, 4, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.beginPath();
                this.ctx.arc(12, 15, 4, 0, Math.PI * 2);
                this.ctx.fill();
                this.ctx.restore();
            }

            showMenu(title = '植物大战僵尸', message = '保卫你的花园！') {
                const menu = document.getElementById('gameMenu');
                menu.querySelector('h1').textContent = title;
                menu.querySelector('p').textContent = message;
                menu.style.display = 'block';
            }

            hideMenu() {
                document.getElementById('gameMenu').style.display = 'none';
                document.getElementById('pauseMenu').style.display = 'none';
            }

            start() {
                this.hideMenu();
                this.hideMainMenu();
                this.sunCount = 50;
                this.wave = 0;
                this.zombiesInWave = 0;
                this.zombiesKilled = 0;
                this.plants = [];
                this.zombies = [];
                this.projectiles = [];
                this.suns = [];
                this.coins_game = [];
                this.seeds_game = [];
                this.particles = [];
                this.cooldowns = {};
                this.paused = false;
                this.gameSpeed = 1;
                document.getElementById('speedBtn').textContent = '1x';
                document.getElementById('speedBtn').classList.remove('active');
                this.initGrid();
                this.initLawnMowers();
                this.gameOver = false;
                this.gameWon = false;
                this.gameRunning = true;
                this.lastSunDrop = Date.now();
                this.lastZombieSpawn = Date.now();
                this.updateSunCounter();
                this.updateCoinCounter();
                this.updateCooldowns();
                document.getElementById('waveInfo').textContent = `波次: 1/${this.totalWaves}`;
                sound.playBGM();
                setTimeout(() => this.nextWave(), 5000);
            }

            gameLoop(timestamp) {
                const deltaTime = timestamp - (this.lastFrame || timestamp);
                this.lastFrame = timestamp;
                this.update(deltaTime);
                this.render();
                requestAnimationFrame((t) => this.gameLoop(t));
            }

            run() { requestAnimationFrame((t) => this.gameLoop(t)); }
        }

        const game = new Game();
        game.run();
    </script>
</body>
</html>
