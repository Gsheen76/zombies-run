<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>植物大战僵尸</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="gameContainer">
        <div id="topBar">
            <div id="sunCounter">☀️ 50</div>
            <div id="coinCounter">🪙 0</div>
            <div id="shovelBtn" title="铲子">🪏</div>
            <div id="plantCards"></div>
            <div id="controlBtns">
                <button class="ctrlBtn" id="pauseBtn" title="暂停">⏸️</button>
                <button class="ctrlBtn" id="speedBtn" title="速度">1x</button>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="waveInfo">波次: 1/10</div>
        <div id="levelInfo">关卡: 1</div>
        
        <div id="mainMenu">
            <h1>🌻 植物大战僵尸 🧟</h1>
            <button class="menuBtn" onclick="game.showLevelSelect()">🎮 冒险模式</button>
            <button class="menuBtn" onclick="game.showGarden()">🌻 花园</button>
            <button class="menuBtn" onclick="game.showShop()">🏪 商店</button>
            <button class="menuBtn" onclick="game.showAlmanac()">📖 图鉴</button>
            <button class="menuBtn" onclick="game.showSettings()">⚙️ 设置</button>
        </div>
        
        <div id="levelSelectPanel">
            <h2>🗺️ 选择关卡</h2>
            <div class="levelGrid" id="levelGrid"></div>
            <button class="closeBtn" onclick="game.closeLevelSelect()">返回</button>
        </div>
        
        <div id="settingsPanel">
            <h2>⚙️ 设置</h2>
            <div class="settingRow"><label>背景音乐音量</label><input type="range" id="bgmVolume" min="0" max="100" value="50" onchange="game.setBGMVolume(this.value)"></div>
            <div class="settingRow"><label>音效音量</label><input type="range" id="sfxVolume" min="0" max="100" value="30" onchange="game.setSFXVolume(this.value)"></div>
            <button class="closeBtn" onclick="game.closeSettings()">确定</button>
        </div>
        
        <div id="gardenPanel">
            <h2>🌻 我的花园</h2>
            <div class="seedCount">种子: <span id="seedCount">0</span> 🌱</div>
            <div class="gardenGrid" id="gardenGrid"></div>
            <button class="closeBtn" onclick="game.closeGarden()">返回</button>
        </div>
        
        <div id="shopPanel">
            <h2>🏪 商店</h2>
            <div class="seedCount">金币: <span id="shopCoins">0</span> 🪙</div>
            <div class="shopGrid" id="shopGrid"></div>
            <button class="closeBtn" onclick="game.closeShop()">返回</button>
        </div>
        
        <div id="almanacPanel">
            <h2>📖 图鉴</h2>
            <div class="almanacTabs">
                <button class="almanacTab active" onclick="game.switchAlmanacTab('plants')">🌱 植物</button>
                <button class="almanacTab" onclick="game.switchAlmanacTab('zombies')">🧟 僵尸</button>
            </div>
            <div class="almanacGrid" id="almanacGrid"></div>
            <div class="almanacDetail" id="almanacDetail"></div>
            <button class="closeBtn" onclick="game.closeAlmanac()">返回</button>
        </div>
        
        <div id="plantSelectPanel">
            <h2>🌿 选择出战植物 (最多7个)</h2>
            <div style="text-align:center;margin-bottom:15px;color:#90EE90;">已选择: <span id="selectedCount">0</span>/7</div>
            <div class="shopGrid" id="plantSelectGrid" style="grid-template-columns: repeat(4, 100px);"></div>
            <button class="closeBtn" onclick="game.confirmPlantSelection()">确认选择</button>
        </div>
        
        <div id="victoryPanel">
            <h2>🎉 关卡完成！</h2>
            <div id="victoryStars" style="font-size:36px;text-align:center;margin:20px 0;">⭐⭐⭐</div>
            <div id="victoryMessage" style="text-align:center;margin-bottom:20px;"></div>
            <button class="closeBtn" id="nextLevelBtn" onclick="game.nextLevel()" style="margin-bottom:10px;">下一关</button>
            <button class="closeBtn" onclick="game.returnToMenu()" style="background:#607d8b;">返回主菜单</button>
        </div>
        
        <div id="countdownDisplay" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:48px;color:#FFD700;text-shadow:2px 2px 4px rgba(0,0,0,0.8);display:none;z-index:150;">
            僵尸即将出现: <span id="countdownTimer">20</span>
        </div>
        
        <div id="pauseMenu">
            <h2>⏸️ 游戏暂停</h2>
            <button class="menuBtn" onclick="game.resume()">▶️ 继续游戏</button>
            <button class="menuBtn" onclick="game.restart()">🔄 重新开始</button>
            <button class="menuBtn" onclick="game.backToMenu()">🏠 返回主菜单</button>
        </div>
        
        <div id="gameMenu">
            <h1>植物大战僵尸</h1>
            <p>保卫你的花园！</p>
            <button onclick="game.start()">开始游戏</button>
        </div>
        
        <div id="newPlantReward">
            <h2>🎉 获得新植物！</h2>
            <div class="plantIcon" id="rewardIcon">🌱</div>
            <div class="plantName" id="rewardName">豌豆射手</div>
            <button onclick="game.closeReward()">太棒了！</button>
        </div>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
